{% extends 'sending_messages/base.html' %}
{% block content %}
<!-- Форма -->
<!--suppress ALL -->
<form method="post">
    {% csrf_token %}

    <h4 class="text-center">Удалить {{ object.name }}?</h4>

    <div class="row">
        <!--Кнопки-->
        <div>
            <button type="submit">Удалить сообщение</button>
            <a href="{% url 'sending_messages:message_detail' object.pk %}">Отмена</a>
        </div>
    </div>
</form>
{% endblock %}
